<style>
  :root {
    --ink: #1d1b16;
    --paper: #f7f4ec;
    --accent: #9a6b3f;
    --line: #e2dccd;
    --card: #fffdf8;
    --serif: "Gowun Batang", "Iowan Old Style", Georgia, serif;
    --sans: "Noto Sans KR", ui-sans-serif, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); }
  body {
    color: var(--ink);
    font-family: var(--serif);
    -webkit-font-smoothing: antialiased;
  }
  textarea::placeholder, input::placeholder { color: #b3ac9a; }
  button { font-family: inherit; }

  .rc-card { transition: transform .15s ease, box-shadow .15s ease; }
  .rc-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(40,30,10,0.09); }
  .rc-card:focus-visible, button:focus-visible, textarea:focus-visible, input:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }
  @media (prefers-reduced-motion: reduce) { .rc-card { transition: none; } }

  #fallback-msg {
    max-width: 480px; margin: 80px auto; padding: 0 20px;
    text-align: center; font-family: var(--sans); color: var(--ink);
  }

  @keyframes rc-spin { to { transform: rotate(360deg); } }
  .rc-spinner {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid rgba(154,107,63,0.25); border-top-color: var(--accent);
    animation: rc-spin .7s linear infinite; display: inline-block;
  }

</head>
<body>

<div id="root">
  <div id="fallback-msg">
    <p style="font-weight:600; margin-bottom:8px;">화면을 불러오는 중입니다…</p>
    <p style="opacity:.6; font-size:14px;">
      잠시 후에도 이 화면이 그대로라면 자바스크립트 로딩에 문제가 있는 것입니다.
      페이지를 새로고침해 주세요.
    </p>
  </div>
</div>

<script>
window.addEventListener("error", function (e) {
  var root = document.getElementById("root");
  if (root && !root.dataset.rendered) {
    root.innerHTML =
      '<div id="fallback-msg">' +
      '<p style="font-weight:600;margin-bottom:8px;">화면을 불러오는 중 오류가 발생했습니다</p>' +
      '<p style="opacity:.6;font-size:14px;word-break:break-all;">' + (e.message || "알 수 없는 오류") + '</p>' +
      '</div>';
  }
});
</script>

<script src="react.production.min.js"></script>
<script src="react-dom.production.min.js"></script>

<script type="module">
import { initializeApp } from "./firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "./firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, onSnapshot, serverTimestamp,
} from "./firebase-firestore.js";

// ── Firebase 프로젝트 설정 ──────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAI6c2yfcT3WtNp2DMiezrFrBHK2ikGLys",
  authDomain: "reflection-card-p.firebaseapp.com",
  projectId: "reflection-card-p",
  storageBucket: "reflection-card-p.firebasestorage.app",
  messagingSenderId: "437835931255",
  appId: "1:437835931255:web:0ad2ae1dd2c77a2ec43072",
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

// ── 동기화 그룹 코드 ─────────────────────────────────────
// 기기가 속한 "동기화 그룹"의 ID. 처음에는 익명 인증 uid를 그대로 그룹 ID로 쓴다.
// 사람이 다른 기기에 옮겨 적기 쉬운 짧은 코드로 변환해서 보여준다.
const SYNC_GROUP_KEY = "reflection:syncGroupId";

function uidToCode(uid) {
  // uid(28자 영숫자)를 사람이 옮기기 쉬운 8자리 대문자 코드로 축약한다.
  // 같은 uid는 항상 같은 코드가 나오도록 간단한 해시를 사용한다.
  let h1 = 0xdeadbeef, h2 = 0x41c6ce57;
  for (let i = 0; i < uid.length; i++) {
    const ch = uid.charCodeAt(i);
    h1 = Math.imul(h1 ^ ch, 2654435761);
    h2 = Math.imul(h2 ^ ch, 1597334677);
  }
  h1 = (h1 ^ (h1 >>> 16)) >>> 0;
  h2 = (h2 ^ (h2 >>> 16)) >>> 0;
  const ALPHABET = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // 0/O, 1/I 등 혼동 글자 제외
  let code = "";
  let n1 = h1, n2 = h2;
  for (let i = 0; i < 4; i++) { code += ALPHABET[n1 % ALPHABET.length]; n1 = Math.floor(n1 / ALPHABET.length); }
  for (let i = 0; i < 4; i++) { code += ALPHABET[n2 % ALPHABET.length]; n2 = Math.floor(n2 / ALPHABET.length); }
  return code.slice(0, 4) + "-" + code.slice(4, 8);
}

// 코드 -> groupId 역매핑은 Firestore의 별도 컬렉션(codeMap)에 저장해 둔다.
// (해시는 단방향이라 코드만 보고 uid를 복원할 수 없기 때문)
async function resolveCodeToGroup(code) {
  const ref = doc(db, "codeMap", code.toUpperCase());
  const snap = await getDoc(ref);
  return snap.exists() ? snap.data().groupId : null;
}

async function registerCode(code, groupId) {
  const ref = doc(db, "codeMap", code.toUpperCase());
  await setDoc(ref, { groupId, createdAt: serverTimestamp() });
}

// ── 앱 부트스트랩 ────────────────────────────────────────
window.__rcFirebaseReady = new Promise((resolve, reject) => {
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      try { await signInAnonymously(auth); } catch (e) { reject(e); }
      return;
    }
    const savedGroupId = localStorage.getItem(SYNC_GROUP_KEY);
    const groupId = savedGroupId || user.uid;
    if (!savedGroupId) {
      localStorage.setItem(SYNC_GROUP_KEY, groupId);
      const code = uidToCode(user.uid);
      try { await registerCode(code, groupId); } catch (e) { /* 코드 등록 실패는 치명적이지 않음 */ }
    }
    resolve({ db, doc, setDoc, onSnapshot, serverTimestamp, groupId, uid: user.uid, uidToCode, resolveCodeToGroup, registerCode, SYNC_GROUP_KEY });
  });
});
</script>

<script>
(function () {
  var h = React.createElement;
  var useState = React.useState;
  var useEffect = React.useEffect;
  var useCallback = React.useCallback;
  var useRef = React.useRef;

  // ── Helpers ──────────────────────────────────────────────
  function relTime(ts) {
    var diff = Date.now() - ts;
    var m = Math.floor(diff / 60000);
    if (m < 1) return "방금";
    if (m < 60) return m + "분 전";
    var hh = Math.floor(m / 60);
    if (hh < 24) return hh + "시간 전";
    var d = Math.floor(hh / 24);
    if (d < 30) return d + "일 전";
    var mo = Math.floor(d / 30);
    if (mo < 12) return mo + "개월 전";
    return Math.floor(mo / 12) + "년 전";
  }
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function QuoteIcon(props) {
    var size = (props && props.size) || 16;
    var style = props && props.style;
    return h("svg", {
      width: size, height: size, viewBox: "0 0 24 24", fill: "none",
      stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round",
      strokeLinejoin: "round", style: style
    },
      h("path", { d: "M3 21c3 0 7-1 7-8V5c0-1.25-.756-2-2-2H4c-1.25 0-2 .75-2 2v4c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z" }),
      h("path", { d: "M15 21c3 0 7-1 7-8V5c0-1.25-.757-2-2-2h-4c-1.25 0-2 .75-2 2v4c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z" })
    );
  }

  function Icon(props) {
    var name = props.name, size = props.size || 20;
    var common = { width: size, height: size, viewBox: "0 0 24 24", fill: "none",
      stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" };
    if (name === "plus") return h("svg", common, h("path", { d: "M12 5v14M5 12h14" }));
    if (name === "back") return h("svg", common, h("path", { d: "M19 12H5M12 19l-7-7 7-7" }));
    if (name === "trash") return h("svg", common, h("path", { d: "M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" }));
    if (name === "cloud") return h("svg", common, h("path", { d: "M17.5 19H9a7 7 0 1 1 6.71-9h.79a4.5 4.5 0 1 1 0 9z" }));
    if (name === "link") return h("svg", common, h("path", { d: "M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 1 0-7.07-7.07l-1.5 1.5M14 11a5 5 0 0 0-7.07 0L4.1 13.83a5 5 0 1 0 7.07 7.07l1.5-1.5" }));
    return null;
  }

  function App() {
    var fbState = useState(null); var fb = fbState[0], setFb = fbState[1];
    var fbErrorState = useState(null); var fbError = fbErrorState[0], setFbError = fbErrorState[1];
    var cardsState = useState({}); var cardsMap = cardsState[0], setCardsMap = cardsState[1];
    var loadingState = useState(true); var loading = loadingState[0], setLoading = loadingState[1];
    var openState = useState(null); var open = openState[0], setOpen = openState[1];
    var composingState = useState(false); var composing = composingState[0], setComposing = composingState[1];
    var newPhraseState = useState(""); var newPhrase = newPhraseState[0], setNewPhrase = newPhraseState[1];
    var syncPanelState = useState(false); var syncPanelOpen = syncPanelState[0], setSyncPanelOpen = syncPanelState[1];
    var joinCodeState = useState(""); var joinCode = joinCodeState[0], setJoinCode = joinCodeState[1];
    var joinErrorState = useState(""); var joinError = joinErrorState[0], setJoinError = joinErrorState[1];
    var joiningState = useState(false); var joining = joiningState[0], setJoining = joiningState[1];

    var unsubRef = useRef(null);

    // Firebase 준비 — 모듈 스크립트가 비동기로 늦게 실행될 수 있으므로
    // window.__rcFirebaseReady가 생성될 때까지 안전하게 기다린다.
    useEffect(function () {
      var cancelled = false;
      function waitForReady() {
        if (cancelled) return;
        if (window.__rcFirebaseReady) {
          window.__rcFirebaseReady.then(function (result) {
            if (!cancelled) setFb(result);
          }).catch(function (err) {
            if (cancelled) return;
            setFbError(err && err.message ? err.message : "클라우드 연결에 실패했습니다.");
            setLoading(false);
          });
        } else {
          setTimeout(waitForReady, 30);
        }
      }
      waitForReady();
      return function () { cancelled = true; };
    }, []);

    // groupId 문서 구독 (실시간 동기화)
    useEffect(function () {
      if (!fb) return;
      subscribeToGroup(fb.groupId);
      return function () { if (unsubRef.current) unsubRef.current(); };
    }, [fb]);

    function subscribeToGroup(groupId) {
      if (unsubRef.current) { unsubRef.current(); unsubRef.current = null; }
      var ref = fb.doc(fb.db, "syncGroups", groupId);
      setLoading(true);
      unsubRef.current = fb.onSnapshot(ref, function (snap) {
        setLoading(false);
        if (snap.exists()) {
          var data = snap.data();
          setCardsMap(data.cards || {});
        } else {
          setCardsMap({});
        }
      }, function (err) {
        setLoading(false);
        setFbError("클라우드 동기화 중 오류: " + (err && err.message ? err.message : "알 수 없는 오류"));
      });
    }

    function persistCardsMap(nextMap) {
      setCardsMap(nextMap);
      if (!fb) return;
      var ref = fb.doc(fb.db, "syncGroups", fb.groupId);
      fb.setDoc(ref, { cards: nextMap, updatedAt: fb.serverTimestamp() }, { merge: false }).catch(function (err) {
        setFbError("저장 중 오류가 발생했습니다: " + (err && err.message ? err.message : ""));
      });
    }

    function touch(id) {
      var c = cardsMap[id];
      if (!c) return;
      var next = Object.assign({}, cardsMap);
      next[id] = Object.assign({}, c, { touchedAt: Date.now() });
      persistCardsMap(next);
    }
    function addCard() {
      var phrase = newPhrase.trim();
      if (!phrase) return;
      var now = Date.now();
      var id = uid();
      var card = { id: id, phrase: phrase, source: "", insights: "", createdAt: now, touchedAt: now };
      var next = Object.assign({}, cardsMap);
      next[id] = card;
      persistCardsMap(next);
      setNewPhrase(""); setComposing(false); setOpen(id);
    }
    function updateField(id, field, value) {
      var c = cardsMap[id];
      if (!c) return;
      var patch = {}; patch[field] = value; patch.touchedAt = Date.now();
      var next = Object.assign({}, cardsMap);
      next[id] = Object.assign({}, c, patch);
      persistCardsMap(next);
    }
    function removeCard(id) {
      var next = Object.assign({}, cardsMap);
      delete next[id];
      persistCardsMap(next);
      setOpen(null);
    }

    async function handleJoin() {
      var code = joinCode.trim().toUpperCase();
      if (!code) return;
      setJoining(true); setJoinError("");
      try {
        var groupId = await fb.resolveCodeToGroup(code);
        if (!groupId) {
          setJoinError("코드를 찾을 수 없습니다. 다시 확인해 주세요.");
          setJoining(false);
          return;
        }
        localStorage.setItem(fb.SYNC_GROUP_KEY, groupId);
        setFb(Object.assign({}, fb, { groupId: groupId }));
        subscribeToGroup(groupId);
        setSyncPanelOpen(false);
        setJoinCode("");
      } catch (e) {
        setJoinError("연결 중 오류가 발생했습니다.");
      }
      setJoining(false);
    }

    var cardsArr = Object.keys(cardsMap).map(function (k) { return cardsMap[k]; });
    var sorted = cardsArr.slice().sort(function (a, b) { return b.touchedAt - a.touchedAt; });
    var current = open ? cardsMap[open] : null;

    var children = [];

    children.push(h("header", { style: S.header, key: "header" },
      h("div", null,
        h("div", { style: S.kicker }, "매일 마주하는 질문들"),
        h("h1", { style: S.title }, "성찰의 카드")
      ),
      h("div", { style: { display: "flex", gap: 8 } },
        h("button", { style: S.iconCircleBtn, onClick: function () { setSyncPanelOpen(true); }, "aria-label": "기기 동기화" },
          h(Icon, { name: "cloud", size: 17 })
        ),
        h("button", { style: S.addBtn, onClick: function () { setComposing(true); }, "aria-label": "새 카드 추가" },
          h(Icon, { name: "plus", size: 18 })
        )
      )
    ));

    if (fbError) {
      children.push(h("div", { style: S.errorBanner, key: "error" }, fbError));
    }

    if (loading) {
      children.push(h("div", { style: S.empty, key: "loading" },
        h("span", { className: "rc-spinner" }),
        h("p", { style: { margin: "14px 0 0", opacity: 0.6, fontSize: 14, fontFamily: "var(--sans)" } }, "클라우드에서 불러오는 중…")
      ));
    } else if (sorted.length === 0) {
      children.push(h("div", { style: S.empty, key: "empty" },
        h(QuoteIcon, { size: 28, style: { opacity: 0.4 } }),
        h("p", { style: { margin: "14px 0 4px", fontWeight: 700 } }, "아직 카드가 없습니다"),
        h("p", { style: { margin: 0, opacity: 0.6, fontSize: 14, fontFamily: "var(--sans)" } },
          "오른쪽 위 + 를 눌러 깊이 생각하고 싶은", h("br"), "문장을 하나 적어보세요.")
      ));
    } else {
      children.push(h("div", { style: S.grid, key: "grid" },
        sorted.map(function (c) {
          return h("button", {
            key: c.id, className: "rc-card", style: S.card,
            onClick: function () { touch(c.id); setOpen(c.id); }
          },
            h(QuoteIcon, { size: 16, style: S.cardQuote }),
            h("div", { style: S.cardPhrase }, c.phrase),
            h("div", { style: S.cardMeta },
              c.source ? h("span", { style: S.cardSource }, c.source) : h("span"),
              h("span", { style: S.cardTime }, relTime(c.touchedAt))
            )
          );
        })
      ));
    }

    if (composing) {
      children.push(h("div", { style: S.overlay, key: "overlay", onClick: function () { setComposing(false); } },
        h("div", { style: S.composer, onClick: function (e) { e.stopPropagation(); } },
          h("div", { style: S.composerLabel }, "마주하고 싶은 문장"),
          h("textarea", {
            autoFocus: true, value: newPhrase,
            onChange: function (e) { setNewPhrase(e.target.value); },
            placeholder: "예) 나는 오늘 무엇을 더 나아지게 했는가?",
            style: S.composerInput,
            onKeyDown: function (e) { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) addCard(); }
          }),
          h("div", { style: S.composerActions },
            h("button", { style: S.ghostBtn, onClick: function () { setComposing(false); } }, "취소"),
            h("button", { style: S.primaryBtn, onClick: addCard }, "카드 만들기")
          )
        )
      ));
    }

    if (syncPanelOpen) {
      var myCode = fb ? fb.uidToCode(fb.uid) : "";
      children.push(h("div", { style: S.overlay, key: "sync-overlay", onClick: function () { setSyncPanelOpen(false); } },
        h("div", { style: S.composer, onClick: function (e) { e.stopPropagation(); } },
          h("div", { style: S.composerLabel }, "이 기기의 동기화 코드"),
          h("div", { style: S.syncCodeBox }, myCode || "불러오는 중…"),
          h("p", { style: S.syncHint }, "다른 기기에서 아래 입력란에 이 코드를 입력하면 같은 카드 목록을 보게 됩니다."),
          h("div", { style: S.fieldLabel }, "다른 기기의 코드로 연결하기"),
          h("div", { style: { display: "flex", gap: 8 } },
            h("input", {
              value: joinCode,
              onChange: function (e) { setJoinCode(e.target.value); setJoinError(""); },
              placeholder: "XXXX-XXXX",
              style: Object.assign({}, S.sourceInput, { flex: 1 }),
              onKeyDown: function (e) { if (e.key === "Enter") handleJoin(); }
            }),
            h("button", {
              style: Object.assign({}, S.primaryBtn, { opacity: joining ? 0.6 : 1 }),
              onClick: handleJoin, disabled: joining
            }, joining ? "연결 중…" : "연결")
          ),
          joinError ? h("p", { style: S.syncError }, joinError) : null,
          h("div", { style: S.composerActions },
            h("button", { style: S.ghostBtn, onClick: function () { setSyncPanelOpen(false); } }, "닫기")
          )
        )
      ));
    }

    if (current) {
      children.push(h("div", { style: S.detailWrap, key: "detail" },
        h("div", { style: S.detailBar },
          h("button", { style: S.iconBtn, onClick: function () { setOpen(null); }, "aria-label": "뒤로" },
            h(Icon, { name: "back", size: 20 })),
          h("button", { style: S.iconBtn, onClick: function () { removeCard(current.id); }, "aria-label": "카드 삭제" },
            h(Icon, { name: "trash", size: 18 }))
        ),
        h("div", { style: S.detailBody },
          h("div", { style: { color: "var(--accent)", marginBottom: 12 } }, h(QuoteIcon, { size: 22 })),
          h("textarea", {
            value: current.phrase,
            onChange: function (e) { updateField(current.id, "phrase", e.target.value); },
            style: S.detailPhrase, rows: 2
          }),
          h("div", { style: S.fieldLabel }, "출처 · 어디에서 왔는가"),
          h("input", {
            value: current.source,
            onChange: function (e) { updateField(current.id, "source", e.target.value); },
            placeholder: "책, 사람, 경험…", style: S.sourceInput
          }),
          h("div", { style: S.fieldLabel }, "인사이트 · 생각하며 얻은 것"),
          h("textarea", {
            value: current.insights,
            onChange: function (e) { updateField(current.id, "insights", e.target.value); },
